<link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

<div class="reimbursements-page">
  <div class="reimbursements-header">
    <div class="header-top">
      <button id="backBtn" class="btn-back" title="Back to Timesheet">
        <span class="material-symbols-outlined">arrow_back</span>
      </button>
      <h1>Reimbursement Requests</h1>
      <button id="createRequestBtn" class="btn-action btn-create-request">
        <span class="material-symbols-outlined">add</span>
        Create Request
      </button>
    </div>
  </div>

  <div class="reimbursements-table-container">
    <table class="reimbursements-table" id="reimbursementsTable">
      <thead>
        <tr>
          <th>Date</th>
          <th>Amount</th>
          <th>Event</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="reimbursementsBody">
      </tbody>
    </table>

    <div id="mobileCardsContainer" class="mobile-cards-container"></div>

    <div id="emptyState" class="empty-state" style="display: none;">
      <span class="material-symbols-outlined empty-icon">receipt_long</span>
      <h3>No Reimbursement Requests</h3>
      <p>Click "Create Request" to submit a new reimbursement</p>
    </div>
  </div>
</div>

<!-- Create Request Modal -->
<div id="createRequestModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center; z-index:9999;">
  <div style="background:#fff; color:#333; border-radius:16px; width:90%; max-width:480px; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.15);">
    <div style="display:flex; align-items:center; justify-content:space-between; padding:20px 24px 0;">
      <h3 style="margin:0; font-size:18px; font-weight:700; color:#1f2937;">Create Reimbursement Request</h3>
      <button id="closeCreateModal" style="width:32px; height:32px; border-radius:50%; border:none; background:#f0f0f0; color:#666; cursor:pointer; display:flex; align-items:center; justify-content:center;">
        <span class="material-symbols-outlined">close</span>
      </button>
    </div>
    <div style="padding:20px 24px;">
      <div style="margin-bottom:16px;">
        <label for="eventNameInput" style="display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">Event Name</label>
        <input type="text" id="eventNameInput" list="eventSuggestions" placeholder="Start typing an event name..." autocomplete="off" style="width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; font-family:'Roboto',sans-serif; box-sizing:border-box; color:#333; background:#fff;">
        <datalist id="eventSuggestions"></datalist>
        <input type="hidden" id="eventIdInput">
      </div>
      <div style="margin-bottom:16px;">
        <label for="descriptionInput" style="display:block; font-size:13px; font-weight:600; color:#555; margin-bottom:6px;">Short Description</label>
        <textarea id="descriptionInput" rows="3" placeholder="Briefly describe this reimbursement request..." style="width:100%; padding:10px 14px; border:1px solid #ddd; border-radius:8px; font-size:14px; font-family:'Roboto',sans-serif; box-sizing:border-box; color:#333; background:#fff; resize:vertical;"></textarea>
      </div>
    </div>
    <div style="display:flex; gap:12px; justify-content:flex-end; padding:0 24px 20px;">
      <button id="cancelCreateBtn" style="padding:10px 24px; background:transparent; color:#666; border:1px solid #ddd; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Cancel</button>
      <button id="submitCreateBtn" style="padding:10px 24px; background:#CC0007; color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">Create</button>
    </div>
  </div>
</div>
