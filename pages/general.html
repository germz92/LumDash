<!-- Google Fonts Roboto -->
<link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
<!-- Add Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

<div class="general-page">
  <header class="general-page-header">
    <div class="general-page-toolbar">
      <div id="adminNotesBtnContainer"></div>
      <div id="clockIconContainer">
        <button id="clockIconBtn" class="clock-icon-btn general-toolbar-icon-btn" title="Show current time" aria-label="Show current time">
          <span class="material-symbols-outlined">schedule</span>
        </button>
      </div>
    </div>
    <h1 id="eventTitle" class="general-event-title"></h1>
  </header>

  <form id="generalForm" class="general-form">
    <section class="general-overview" aria-label="Event overview">
      <div class="info-section">
        <div class="info-card info-card--summary">
          <label for="summary" class="info-card-label info-card-label--toggle" onclick="toggleEventSummary()">
            <span class="info-card-label-text">
              <span class="material-symbols-outlined">description</span>
              Event Summary
            </span>
            <span class="material-symbols-outlined info-card-chevron" id="summaryToggleIcon">expand_more</span>
          </label>
          <div id="summaryContent" class="info-card-body">
            <div id="summary" class="read-only"></div>
            <div id="summaryEditorContainer" class="summary-editor-wrap">
              <div id="summaryEditor" class="tinymce-editor"></div>
            </div>
          </div>
        </div>

        <div class="general-stats-grid">
          <div class="info-row">
            <div class="info-card">
              <label for="location" class="info-card-label">
                <span class="material-symbols-outlined">place</span>
                Location
              </label>
              <div id="location" class="read-only info-card-value"></div>
            </div>
            <div class="info-card">
              <label for="weather" class="info-card-label">Weather</label>
              <div id="weather" class="read-only info-card-value"></div>
            </div>
          </div>

          <div class="info-row info-row--dates">
            <div class="info-card">
              <label for="start" class="info-card-label">
                <span class="material-symbols-outlined">calendar_month</span>
                Start Date
              </label>
              <input type="date" id="start" name="start" placeholder="Select Date">
            </div>
            <div class="info-card">
              <label for="end" class="info-card-label">
                <span class="material-symbols-outlined">calendar_month</span>
                End Date
              </label>
              <input type="date" id="end" name="end" placeholder="Select Date">
            </div>
          </div>

          <div class="info-row">
            <div class="info-card">
              <label for="attendees" class="info-card-label">
                <span class="material-symbols-outlined">groups</span>
                Attendee Count
              </label>
              <div id="attendees" class="read-only info-card-value"></div>
            </div>
            <div class="info-card">
              <label for="budget" class="info-card-label">
                <span class="material-symbols-outlined">payments</span>
                Budget
              </label>
              <div id="budget" class="read-only info-card-value"></div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="general-section" aria-label="Point of contacts">
      <div class="general-section-header">
        <h2 class="general-section-title">
          <span class="material-symbols-outlined">contacts</span>
          Point of Contacts
        </h2>
      </div>
      <div class="contacts-container general-table-card">
        <div class="contacts-scroll-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>Role</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="contactRows"></tbody>
          </table>
        </div>
        <button type="button" class="add-row-btn general-btn-secondary" onclick="addContactRow()">
          <span class="material-symbols-outlined">add</span>
          Add Row
        </button>
      </div>
    </section>

    <section class="general-section" aria-label="Locations">
      <div class="general-section-header">
        <h2 class="general-section-title">
          <span class="material-symbols-outlined">business</span>
          Locations
        </h2>
      </div>
      <div class="contacts-container general-table-card">
        <div class="contacts-scroll-wrapper">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Address</th>
                <th>Event</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="locationsRows"></tbody>
          </table>
        </div>
        <button type="button" class="add-row-btn general-btn-secondary" onclick="addLocationRow()">
          <span class="material-symbols-outlined">add</span>
          Add Row
        </button>
      </div>
    </section>

    <div class="save-button-container">
      <button type="button" class="add-row-btn general-btn-primary" onclick="saveGeneralInfo()">Save Changes</button>
      <button id="editBtn" type="button" class="add-row-btn general-btn-outline" onclick="switchToEdit()">Edit</button>
    </div>
  </form>
</div>
